name: Daily message

"on":
  schedule:
    - cron: "0 17 * * *"   # 17:00 UTC = 20:00 МСК (UTC+3)
  workflow_dispatch: {}     # позволяет запустить вручную из вкладки Actions

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Send message
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_1: ${{ secrets.CHAT_ID_1 }}
          CHAT_ID_2: ${{ secrets.CHAT_ID_2 }}
        run: python send.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update state after daily send" || echo "Нет изменений для коммита"
          git push
